name: Siang Model Engine

on:
  schedule:
    - cron: '0 8 * * 5'
  workflow_dispatch:

concurrency:
  group: siang-model
  cancel-in-progress: true


jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install pandas requests lxml beautifulsoup4 pyarrow yfinance

      - name: run
        run: |
          python main.py
          sleep 10
          python scanner.py

      - name: commit
        run: |
          git config user.name "Siang-Bot"
          git config user.email "bot@github.com"

          git pull --rebase origin main || true
          git add .

          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "update $(date)"
            git push
          fi
