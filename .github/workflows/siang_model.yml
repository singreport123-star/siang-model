name: Siang Model Engine
on:
  schedule:
    # 每週五 台灣時間 16:00（UTC 08:00）
    - cron: '0 8 * * 5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests lxml html5lib beautifulsoup4 pyarrow yfinance

      - name: Run Siang Model
        run: |
          python main.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Siang-Model-Bot"

          git pull --rebase origin main || echo "Rebase skipped"

          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "Siang Model: Auto Update $(date +'%Y-%m-%d %H:%M')"
            git push
          else
            echo "No changes detected, skipping push."
          fi
