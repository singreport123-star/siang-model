name: Siang Model Engine

on:
  schedule:
    - cron: '0 8 * * 5'   # 每週五 16:00 (台灣時間)
  workflow_dispatch:       # 允許手動觸發

concurrency:
  group: siang-model
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONDONTWRITEBYTECODE: 1

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: 🐍 Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas requests lxml html5lib beautifulsoup4 pyarrow yfinance

      - name: 🚀 Run model (下載籌碼)
        run: python main.py

      - name: ⏳ Wait for filesystem sync
        run: sleep 10

      - name: 📊 Run scanner (全市場掃描)
        run: python scanner.py

      - name: 💾 Commit and Push (同步邏輯最終優化版)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Siang-Model-Bot"
          
          # 1. 標記變動：把 Python 產出的新資料加入暫存
          git add -A
          
          # 2. 檢查是否有變動
          if [ -n "$(git status --porcelain)" ]; then
            # 3. 關鍵修正：先 Commit 鎖定資料，清除暫存區 Index 負擔
            git commit -m "🚀 Siang Model: Database Update $(date +'%Y-%m-%d %H:%M')"
            
            # 4. 資料鎖定後，執行 rebase 合併就不會噴 128 錯誤
            # 如果雲端有變動，會把你的 Commit 接在後面
            git pull --rebase origin main || (git rebase --abort && exit 1)
            
            # 5. 推送回 GitHub
            git push origin main
          else
            echo "No changes to commit."
          fi

      - name: ❌ Notify on failure
        if: failure()
        run: |
          echo "::error::祥哥籌碼模型執行失敗！請確認 main.py 與 Git 同步狀態。"
