name: Siang Model Engine

on:
  schedule:
    - cron: '0 8 * * 5'
  workflow_dispatch:

concurrency:
  group: siang-model
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas requests lxml html5lib beautifulsoup4 pyarrow yfinance

      - name: Run model
        run: |
          python main.py
          sleep 15
          python scanner.py

      - name: Commit & Push (關鍵修正)
        run: |
          git config user.email "action@github.com"
          git config user.name "Siang-Model-Bot"

          # 🔴 強制同步遠端（避免 rebase 問題）
          git fetch origin
          git reset --hard origin/main

          # 🔴 加入所有變更（包含 parquet）
          git add -A

          # 🔴 確認是否有變更
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "🚀 Data Sync $(date +'%Y-%m-%d %H:%M')"
            git push origin main
          else
            echo "No changes to commit"
          fi
