name: Siang Model Engine

on:
  schedule:
    - cron: '0 8 * * 5'   # 每週五 08:00 UTC（台灣時間 16:00）
  workflow_dispatch:       # 允許手動觸發

concurrency:
  group: siang-model
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONDONTWRITEBYTECODE: 1

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: 🐍 Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'          # 快取 pip 套件，加快後續執行速度

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas requests lxml html5lib beautifulsoup4 pyarrow yfinance

      - name: 🚀 Run model (下載籌碼)
        run: python main.py

      - name: ⏳ Wait for filesystem sync
        run: sleep 10

      - name: 📊 Run scanner (全市場掃描)
        run: python scanner.py

      - name: 💾 Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Siang-Model-Bot"
          git pull --rebase origin main || git rebase --abort
          git add -A
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "🚀 Siang Model: Database Update $(date +'%Y-%m-%d %H:%M')"
            git push origin main
          else
            echo "No changes to commit."
          fi

      - name: ❌ Notify on failure
        if: failure()
        run: |
          echo "::error::祥哥籌碼模型執行失敗！請至 Actions 查看詳細日誌。"
          # 如需 Slack / Line / Email 通知，可在此加入對應的 curl 指令
          # curl -X POST ${{ secrets.SLACK_WEBHOOK }} -d '{"text":"❌ Siang Model 執行失敗"}'
