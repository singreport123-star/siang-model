name: Siang Model Engine

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 核心修正：html5lib 解決 0 筆問題，pyarrow 處理 Parquet
          pip install pandas requests lxml html5lib pyarrow
      - name: Run Siang Model
        run: python main.py
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Siang-Model-Bot"
          git add .
          git commit -m "Auto Update: $(date +'%Y-%m-%d')" || exit 0
          git push
