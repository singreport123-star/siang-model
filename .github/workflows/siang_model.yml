name: Siang Model Engine

on:
  schedule:
    - cron: '0 8 * * 5'   # 每週五 16:00 (台灣時間)
  workflow_dispatch:       # 允許手動觸發

concurrency:
  group: siang-model
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONDONTWRITEBYTECODE: 1

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: 🐍 Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas requests lxml html5lib beautifulsoup4 pyarrow yfinance

      - name: 🚀 Run model (下載籌碼)
        run: python main.py

      - name: ⏳ Wait for filesystem sync
        run: sleep 10

      - name: 📊 Run scanner (全市場掃描)
        run: python scanner.py

      - name: 💾 Commit and Push (修復同步衝突順序)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Siang-Model-Bot"
          
          # 1. 先將所有新抓到的資料加入標記，解除 Git 的 unstaged 狀態
          git add -A
          
          # 2. 拉取遠端變動並進行 rebase
          # 這一步在 add 之後執行就不會再噴 exit code 128
          git pull --rebase origin main || git rebase --abort
          
          # 3. 檢查是否有真正的新資料需要 commit
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "🚀 Siang Model: Database Update $(date +'%Y-%m-%d %H:%M')"
            git push origin main
          else
            echo "No changes to commit."
          fi

      - name: ❌ Notify on failure
        if: failure()
        run: |
          echo "::error::祥哥籌碼模型執行失敗！請至 Actions 查看詳細日誌。"
