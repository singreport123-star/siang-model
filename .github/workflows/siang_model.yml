name: Siang Model Engine

on:
  # 支援 cron-job.org 等外部 API 觸發
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 關鍵：開啟寫入權限，機器人才能把更新後的數據 (parquet/json) 推回 Repo
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # 使用最新版 Checkout

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 核心修正：
          # 1. lxml + html5lib + beautifulsoup4: 解決 mapping done: 0 的問題
          # 2. pyarrow: 處理 Parquet 格式必備
          pip install pandas requests lxml html5lib beautifulsoup4 pyarrow

      - name: Run Siang Model
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Siang-Model-Bot"
          git add .
          # 若資料沒有變動 (例如集保尚未更新)，則跳過 commit 不噴錯
          git commit -m "Siang Model: Auto Update $(date +'%Y-%m-%d')" || exit 0
          git push
