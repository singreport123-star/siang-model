name: Siang Model Engine

on:
  # 支援手動按鈕觸發，也支援外部透過 API (cron-job.org) 觸發
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 務必開啟寫入權限，否則資料更新後無法推回 Repo
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests lxml pyarrow

      - name: Run Siang Model
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Siang-Model-Bot"
          git add .
          # 若資料沒有變動 (例如集保還沒更新)，則跳過 commit
          git commit -m "Siang Model: Auto Update $(date +'%Y-%m-%d')" || exit 0
          git push
