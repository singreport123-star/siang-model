name: Siang Model Engine

on:
  schedule:
    - cron: '0 8 * * 5'   # 每週五 16:00 (台灣時間)
  workflow_dispatch:       # 允許手動觸發

concurrency:
  group: siang-model
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONDONTWRITEBYTECODE: 1

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0 # 必須設為 0 才能進行 rebase 合併[cite: 16]

      - name: 🐍 Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas requests lxml html5lib beautifulsoup4 pyarrow yfinance[cite: 14]

      - name: 🚀 Run model (下載籌碼)
        run: python main.py[cite: 13]

      - name: ⏳ Wait for filesystem sync
        run: sleep 10[cite: 16]

      - name: 📊 Run scanner (全市場掃描)
        run: python scanner.py[cite: 15]

      - name: 💾 Commit and Push (修正版順序)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Siang-Model-Bot"
          
          # 1. 先標記所有變動，解決 unstaged changes 報錯
          git add -A
          
          # 2. 檢查是否有新資料需要 commit
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "🚀 Siang Model: Database Update $(date +'%Y-%m-%d %H:%M')"
            
            # 3. Commit 後再進行同步，這時 rebase 就不會報錯
            git pull --rebase origin main || git rebase --abort
            
            # 4. 推送到雲端
            git push origin main
          else
            echo "No changes to commit."
          fi

      - name: ❌ Notify on failure
        if: failure()
        run: |
          echo "::error::祥哥籌碼模型執行失敗！請至 Actions 查看詳細日誌。"
