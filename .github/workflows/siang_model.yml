name: Siang Model Engine
on:
  schedule:
    - cron: '0 8 * * 5'
  workflow_dispatch:

concurrency:
  group: siang-model
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install
        run: pip install pandas requests lxml html5lib beautifulsoup4 pyarrow yfinance

      - name: Run model & scanner
        run: |
          python main.py
          sleep 10
          python scanner.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Siang-Model-Bot"

          # 解決雲端狀態落後問題
          git pull --rebase origin main || git rebase --abort

          # 修正：用 git add -A 取代 "git add data/ ."，避免 data/ 不存在時報錯
          git add -A

          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "🚀 Siang Model: Data & Snapshot Update $(date +'%Y-%m-%d %H:%M')"
            git push origin main
          else
            echo "No changes found, skipping push."
          fi
